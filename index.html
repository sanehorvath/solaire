<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solaire — Connexion</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<style>
body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--bg); }
.login-bg {
  position: fixed; inset: 0; z-index: 0;
  background: radial-gradient(ellipse 60% 60% at 50% 0%, rgba(212,168,83,0.08) 0%, transparent 70%);
}
.login-wrap { position: relative; z-index: 1; width: 100%; max-width: 400px; padding: 20px; }
.login-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 40px 36px;
  box-shadow: var(--shadow-lg);
}
.login-logo { text-align: center; margin-bottom: 32px; }
.login-logo-icon { font-size: 40px; margin-bottom: 8px; }
.login-logo h1 { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 28px; letter-spacing: -0.03em; color: var(--accent); }
.login-logo p { font-size: 12px; color: var(--text3); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.1em; }
.login-form-group { margin-bottom: 16px; }
.login-form-group label { display: block; font-size: 11px; font-weight: 700; font-family: 'Syne', sans-serif; color: var(--text2); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
.login-submit { width: 100%; margin-top: 24px; padding: 13px; font-size: 14px; border-radius: var(--radius-sm); background: var(--accent); color: #0a0b0f; font-weight: 700; font-family: 'Syne', sans-serif; border: none; cursor: pointer; transition: all .2s; letter-spacing: 0.03em; }
.login-submit:hover { background: var(--accent2); transform: translateY(-1px); }
.login-error { background: var(--red-dim); border: 1px solid rgba(239,68,68,0.3); border-radius: var(--radius-sm); padding: 10px 14px; font-size: 13px; color: var(--red); margin-top: 12px; display: none; }
.demo-hint { background: var(--accent-dim); border: 1px solid rgba(212,168,83,0.2); border-radius: var(--radius-sm); padding: 12px 14px; margin-top: 20px; }
.demo-hint p { font-size: 12px; color: var(--accent); margin-bottom: 6px; font-weight: 600; font-family: 'Syne', sans-serif; }
.demo-hint ul { font-size: 11px; color: var(--text3); list-style: none; }
.demo-hint li { padding: 2px 0; }
.demo-hint li span { color: var(--text2); }
</style>
</head>
<body>
<div class="login-bg"></div>
<div class="login-wrap">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-icon">☀️</div>
      <h1>SOLAIRE</h1>
      <p>Dashboard Opérationnel</p>
    </div>
    <div class="login-form-group">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="votre@email.com" autocomplete="email">
    </div>
    <div class="login-form-group">
      <label>Mot de passe</label>
      <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <div class="login-error" id="login-error">Email ou mot de passe incorrect</div>
    <button class="login-submit" onclick="handleLogin()">Se connecter</button>
    <div class="demo-hint">
      <p>🧪 Comptes démo (mot de passe : demo1234)</p>
      <ul>
        <li>🟡 <span>sane@solaire.com</span> — Founder</li>
        <li>🔵 <span>matheo@solaire.com</span> — Founder</li>
        <li>🟢 <span>hugo@solaire.com</span> — Founder</li>
        <li>🔴 <span>lucas@solaire.com</span> — Commercial</li>
      </ul>
    </div>
  </div>
</div>
<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  const existing = getDemoUser();
  if (existing) {
    window.location.href = existing.role === 'founder' ? 'dashboard-founder.html' : 'dashboard-commercial.html';
  }
  document.getElementById('login-password').addEventListener('keydown', e => {
    if (e.key === 'Enter') handleLogin();
  });
});

function handleLogin() {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const profile = authLogin(email, password);
  if (!profile) {
    document.getElementById('login-error').style.display = 'block';
    return;
  }
  window.location.href = profile.role === 'founder' ? 'dashboard-founder.html' : 'dashboard-commercial.html';
}
</script>
</body>
</html>
