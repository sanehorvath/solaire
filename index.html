<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Solaire — Connexion</title>
<link rel="stylesheet" href="css/style.css"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<!-- data.js synchrone pour que DEMO_LOGINS soit dispo immédiatement -->
<script src="js/data.js"></script>
<script src="js/utils.js"></script>
<script>
// Redirection si déjà connecté
(function(){
  const u = getCurrentUser();
  if (u) window.location.href = u.role === 'founder' ? 'dashboard-founder.html' : 'dashboard-commercial.html';
  // Appliquer le thème sauvegardé
  const t = localStorage.getItem('solaire_theme') || 'dark';
  if (t === 'light') document.documentElement.classList.add('light');
})();
</script>
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-icon">☀️</div>
      <div>
        <div class="login-logo-text">SOLAIRE</div>
        <div class="login-logo-sub">Dashboard opérationnel</div>
      </div>
    </div>
    <div class="login-field">
      <label class="login-label">Email</label>
      <input id="inp-email" class="inp" type="email" placeholder="email@solaire.com" autocomplete="username"/>
    </div>
    <div class="login-field">
      <label class="login-label">Mot de passe</label>
      <input id="inp-pw" class="inp" type="password" placeholder="••••••••" autocomplete="current-password"/>
    </div>
    <div id="login-err" class="login-err"></div>
    <button class="btn-primary w100" onclick="doLogin()">Se connecter</button>
    <div class="login-hint">
      <strong>Comptes démo · mot de passe : demo1234</strong><br/>
      Founders : sane / matheo / clement / hugo @solaire.com<br/>
      Commerciaux : lucas / sarah @solaire.com
    </div>
  </div>
</div>
<script>
document.getElementById('inp-pw').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doLogin();
});
function doLogin() {
  const email = document.getElementById('inp-email').value.trim().toLowerCase();
  const pw    = document.getElementById('inp-pw').value;
  const user  = DEMO_LOGINS[email];
  if (!user || user.password !== pw) {
    document.getElementById('login-err').textContent = 'Email ou mot de passe incorrect.';
    return;
  }
  sessionStorage.setItem('solaire_user', JSON.stringify({email, role:user.role, name:user.name, initials:user.initials}));
  window.location.href = user.role === 'founder' ? 'dashboard-founder.html' : 'dashboard-commercial.html';
}
</script>
</body>
</html>
