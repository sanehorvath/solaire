<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Solaire — Commercial</title>
<link rel="stylesheet" href="css/style.css" />
<link rel="stylesheet" href="css/dashboard.css" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>

<div class="dashboard">
  <!-- ── SIDEBAR ─────────────────────────────────────── -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-icon">☀️</div>
      <div>
        <div class="sidebar-logo-text">Solaire</div>
        <div class="sidebar-logo-role">Commercial</div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-group-label">Principal</div>
      <div class="nav-item active" data-view="overview"   onclick="switchView('overview')">   <span class="nav-icon">📊</span> Dashboard</div>
      <div class="nav-item"        data-view="tasks"      onclick="switchView('tasks')">      <span class="nav-icon">✅</span> Tâches</div>
      <div class="nav-item"        data-view="calendar"   onclick="switchView('calendar')">   <span class="nav-icon">📅</span> Calendrier</div>

      <div class="nav-group-label">CRM</div>
      <div class="nav-item"        data-view="clients"    onclick="switchView('clients')">    <span class="nav-icon">🤝</span> Clients</div>
      <div class="nav-item"        data-view="suppliers"  onclick="switchView('suppliers')">  <span class="nav-icon">🏭</span> Fournisseurs</div>

      <div class="nav-group-label">Finance</div>
      <div class="nav-item"        data-view="invoices"   onclick="switchView('invoices')">   <span class="nav-icon">🧾</span> Facturation</div>
      <div class="nav-item"        data-view="calculator" onclick="switchView('calculator')"> <span class="nav-icon">🔢</span> Calculateur</div>

      <div class="nav-group-label">Communication</div>
      <div class="nav-item"        data-view="messages"   onclick="switchView('messages')">   <span class="nav-icon">💬</span> Messagerie</div>
    </nav>
    <div class="sidebar-footer">
      <div class="user-pill">
        <div class="user-avatar" id="user-avatar">LU</div>
        <div>
          <div class="user-name" id="user-name">Lucas</div>
          <div class="user-role">Commercial</div>
        </div>
      </div>
    </div>
  </aside>

  <!-- ── MAIN ───────────────────────────────────────── -->
  <div class="main">
    <div class="topbar">
      <div class="topbar-title" id="topbar-title">Dashboard</div>
      <div class="topbar-actions">
        <button class="theme-toggle" onclick="toggleTheme()">☀️</button>
        <button class="logout-btn" onclick="logout()">Déconnexion</button>
      </div>
    </div>

    <div class="content">

      <!-- OVERVIEW -->
      <div class="view active" id="view-overview">
        <div class="kpi-grid" style="grid-template-columns:repeat(3,1fr)">
          <div class="kpi-card">
            <div class="kpi-label">Mes tâches actives</div>
            <div class="kpi-value kpi-amber" id="ov-tasks-count">–</div>
          </div>
          <div class="kpi-card">
            <div class="kpi-label">Mes RDV à venir</div>
            <div class="kpi-value kpi-blue" id="ov-rdv-count">–</div>
          </div>
          <div class="kpi-card">
            <div class="kpi-label">Clients actifs</div>
            <div class="kpi-value kpi-green" id="ov-clients-count">–</div>
          </div>
        </div>
        <div class="overview-grid">
          <div class="card">
            <div class="card-title">Mes tâches</div>
            <div id="ov-tasks"></div>
          </div>
          <div class="card">
            <div class="card-title">Mes prochains RDV</div>
            <div id="ov-rdv"></div>
          </div>
        </div>
      </div>

      <!-- TASKS -->
      <div class="view" id="view-tasks"></div>

      <!-- CALENDAR -->
      <div class="view" id="view-calendar"></div>

      <!-- CLIENTS -->
      <div class="view" id="view-clients"></div>

      <!-- SUPPLIERS -->
      <div class="view" id="view-suppliers"></div>

      <!-- INVOICES -->
      <div class="view" id="view-invoices"></div>

      <!-- CALCULATOR -->
      <div class="view" id="view-calculator"></div>

      <!-- MESSAGES -->
      <div class="view" id="view-messages"></div>

    </div>
  </div>
</div>

<script src="js/data.js"></script>
<script src="js/utils.js"></script>
<script src="js/modules.js"></script>
<script>
const VIEW_LABELS = {
  overview:'Dashboard', tasks:'Tâches', calendar:'Calendrier',
  clients:'Clients', suppliers:'Fournisseurs',
  invoices:'Facturation', calculator:'Calculateur', messages:'Messagerie'
};

function switchView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('view-'+name).classList.add('active');
  document.querySelector(`[data-view="${name}"]`).classList.add('active');
  document.getElementById('topbar-title').textContent = VIEW_LABELS[name];

  const u = getCurrentUser();
  if (name === 'tasks')       initTasks(u.email, u.role);
  if (name === 'calendar')    initCalendar(u.email, u.role);
  if (name === 'clients')     initClients();
  if (name === 'suppliers')   initSuppliers();
  if (name === 'invoices')    initInvoices(u.role);
  if (name === 'calculator')  initCalculator();
  if (name === 'messages')    initMessages();
}

function logout() {
  sessionStorage.removeItem('solaire_user');
  window.location.href = 'index.html';
}

function renderOverview(u) {
  const myTasks = DEMO_TASKS.filter(t => t.assignee === u.email && t.statut !== 'complété');
  const myRdv   = DEMO_APPOINTMENTS.filter(a => a.assignee === u.email);
  const activeClients = DEMO_CLIENTS.filter(c => c.statut === 'Actif');

  document.getElementById('ov-tasks-count').textContent = myTasks.length;
  document.getElementById('ov-rdv-count').textContent   = myRdv.length;
  document.getElementById('ov-clients-count').textContent = activeClients.length;

  document.getElementById('ov-tasks').innerHTML = myTasks.slice(0,4).map(t=>`
    <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px">
      <span>${t.titre}</span>
      <span style="color:var(--accent)">${fmtDate(t.due)}</span>
    </div>
  `).join('') || '<div style="color:var(--text3);font-size:13px;padding:12px 0">Aucune tâche active</div>';

  document.getElementById('ov-rdv').innerHTML = myRdv.slice(0,3).map(a=>`
    <div style="display:flex;gap:12px;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px">
      <span style="color:var(--accent);min-width:80px">${fmtDate(a.date)}</span>
      <span>${a.titre}</span>
    </div>
  `).join('') || '<div style="color:var(--text3);font-size:13px;padding:12px 0">Aucun RDV à venir</div>';
}

document.addEventListener('DOMContentLoaded', () => {
  const u = requireAuth('commercial');
  if (!u) return;
  document.getElementById('user-name').textContent = u.name;
  document.getElementById('user-avatar').textContent = u.avatar;
  initTheme();
  renderOverview(u);
});
</script>
</body>
</html>
